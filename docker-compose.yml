version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=ai_phone_agent
      - POSTGRES_USER=ai_phone_agent
      - POSTGRES_PASSWORD=ai_phone_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_phone_agent -d ai_phone_agent"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgres://ai_phone_agent:ai_phone_agent@db:5432/ai_phone_agent}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - APP_URL=${APP_URL:-http://localhost:3000}
      - DASHBOARD_API_KEY=${DASHBOARD_API_KEY:-dev}
    volumes:
      - call_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/stats"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  call_data:
    driver: local
  pgdata:
    driver: local
